<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Fading Snake</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="container">
  <header>
    <div class="contrast">100%</div>
    <div class="score">0</div>
  </header>
<div class="grid"></div>
  <div class="controls" aria-label="Snake controls">
    <button type="button" class="control-btn up" data-direction="up" aria-label="Move up">▲</button>
    <div class="controls-row">
      <button type="button" class="control-btn left" data-direction="left" aria-label="Move left">◀</button>
      <button type="button" class="control-btn down" data-direction="down" aria-label="Move down">▼</button>
      <button type="button" class="control-btn right" data-direction="right" aria-label="Move right">▶</button>
    </div>
  </div>
<footer>Tap the game screen, then use arrow keys to move.
    <div>Need a harder challenge? Press H.
  </footer>
</div>
    <script src="./script.js"></script>

  </body>
  
</html>
